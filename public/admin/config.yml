backend:
  name: github
  repo: vipyou163/vexilon
  branch: main
  base_url: https://cmsyz.766099666.workers.dev
  auth_endpoint: /authorize

media_folder: public/images
public_folder: /images

collections:
  - name: machines
    label: 二手设备
    label_singular: 设备
    folder: src/data/machines
    create: true
    identifier_field: title
    format: frontmatter
    summary: "{{brand}} {{model}} - {{year}} - ¥{{price_cny}}"
    sortable_fields: [year, price_cny, hours, created_on]
    fields:
      - { label: 品牌, name: brand, widget: string }
      - { label: 型号, name: model, widget: string }
      - { label: 出厂年份, name: year, widget: number, value_type: int }
      - { label: 工作小时, name: hours, widget: number, value_type: int }
      - { label: 价格 (元), name: price_cny, widget: number, value_type: int }
      - { label: 所在地区, name: location, widget: string }
      - label: 状态
        name: status
        widget: select
        options: [available, reserved, sold]
        default: available
      - { label: 首页推荐, name: featured, widget: boolean, default: false, required: false }
      - { label: 详细描述, name: description, widget: markdown, required: false }
      - { label: 封面图片, name: cover_image, widget: image, media_library: { config: { multiple: false } } }
      - { label: 更多图片, name: gallery, widget: list, field: { label: 图片, name: url, widget: image }, required: false }

  - name: posts
    label: 行业资讯
    label_singular: 文章
    folder: src/data/posts
    create: true
    identifier_field: title
    format: frontmatter
    summary: "{{title}} - {{date}}"
    sortable_fields: [date, title]
    fields:
      - { label: 标题, name: title, widget: string }
      - { label: 发布日期, name: date, widget: datetime, format: "YYYY-MM-DD" }
      - { label: 封面图片, name: cover, widget: image, required: false }
      - { label: 正文内容, name: body, widget: markdown }

  - name: site
    label: 网站设置
    delete: false
    editor:
      preview: false
    files:
      - name: general
        label: 全局设置
        file: src/content/site.json
        fields:
          - { label: 公司名称, name: company_name, widget: string }
          - { label: 联系电话, name: phone, widget: string }
          - { label: 微信, name: wechat, widget: string }
          - { label: 邮箱, name: email, widget: string }
          - { label: 公司地址, name: address, widget: string }
          - { label: SEO 标题, name: seo_title, widget: string, required: false }
          - { label: SEO 描述, name: seo_description, widget: string, required: false }
          - { label: 首页主张标题, name: hero_headline, widget: string, required: false }
          - { label: 首页主张副标题, name: hero_subheadline, widget: string, required: false }
          - { label: 首页大图, name: hero_image, widget: image, required: false, hint: "点击上传或从媒体库选择首屏全屏大图" }
          - label: 首页促销卡（中间并排大图）
            name: promo_cards
            widget: list
            required: false
            label_singular: 促销卡
            summary: "{{fields.title}}"
            hint: "首页中部并排展示的图卡，可增删、换图、改标题。建议放 1~2 张。"
            fields:
              - { label: 图片, name: image, widget: image }
              - { label: 标题, name: title, widget: string }
              - { label: 副标题, name: subtitle, widget: string, required: false }
